<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Resume</title>

    <style>
        body {
            margin: 0;
            background: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        iframe {
            width: 100vw;
            height: 90vh; /* Leave space for button */
            border: none;
        }
        .download-area {
            text-align: center;
            padding: 15px;
            background: #ffffff;
            box-shadow: 0 -2px 8px rgba(0,0,0,0.1);
        }
        .download-btn {
            background: #007bff;
            color: white;
            padding: 12px 22px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
        }
        .download-btn:hover {
            background: #0056c1;
        }
    </style>
</head>

<body>

    <!-- PDF display -->
    <iframe src="Sriram Raghavan_Resume (2)"></iframe>

    <!-- Download button section -->
    <div class="download-area">
        <a class="download-btn" href="resume.pdf" download>
            ⬇ Download Resume (PDF)
        </a>
    </div>

</body>
</html>
